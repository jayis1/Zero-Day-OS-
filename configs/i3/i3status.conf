# /etc/i3status.conf — ZERO-DAY OS status bar
# Compact format for 1.9" screen

general {
    output_format = "i3bar"
    colors = true
    interval = 5
    color_good = "#00ff41"
    color_degraded = "#ffd700"
    color_bad = "#ff4444"
}

order += "cpu_temperature 0"
order += "cpu_usage"
order += "load"
order += "memory"
order += "battery 0"
order += "wireless wlan0"
order += "wireless wlan1"
order += "ethernet eth0"
order += "tztime local"

cpu_temperature 0 {
    format = "%degrees°C"
    path = "/sys/class/thermal/thermal_zone0/temp"
}

cpu_usage {
    format = "CPU %usage"
}

load {
    format = "L:%1min"
}

memory {
    format = "M:%used"
    threshold_degraded = "80%"
    threshold_critical = "95%"
}

battery 0 {
    format = "BAT:%percentage %remaining"
    path = "/sys/class/power_supply/bq27220-0/uevent"
    threshold_type = "percentage"
    low_threshold = 15
}

wireless wlan0 {
    format_up = "W0:%ip"
    format_down = "W0:OFF"
}

wireless wlan1 {
    format_up = "DNG:%ip"
    format_down = "DNG:OFF"
}

ethernet eth0 {
    format_up = "E:%ip"
    format_down = "E:OFF"
}

tztime local {
    format = "%H:%M"
}